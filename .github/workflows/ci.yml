name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typegen
      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  container-archive-extractor:
    name: Container / archive-extractor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container/archive-extractor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: container/archive-extractor/go.mod
          cache-dependency-path: container/archive-extractor/go.sum
      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: container/archive-extractor
      - name: Test
        run: go test -v -race -count=1 ./...
      - name: Build
        run: go build -o /dev/null .

  deploy:
    name: Deploy
    needs: [check, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inject secrets into wrangler.toml
        run: |
          sed -i 's/id = "KV_NAMESPACE_ID"/id = "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"/' wrangler.toml
          sed -i 's/bucket_name = "reearth-serve"/bucket_name = "${{ secrets.CLOUDFLARE_R2_BUCKET_NAME }}"/' wrangler.toml
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
