# NOTE: [build] command is intentionally omitted.
# react-router build generates build/server/wrangler.json from this file.
# KV_NAMESPACE_ID is a placeholder that must be replaced before build,
# so deploy scripts (scripts/deploy.sh, CI) run `npm run build` explicitly
# after injecting secrets via sed, then run `wrangler deploy`.

name = "reearth-serve"
main = "./worker/index.ts"

compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# Custom domain. The reearth.land zone must be on the same Cloudflare account
# as this Worker; wrangler manages the routing DNS record automatically.
routes = [
  { pattern = "serve.reearth.land", custom_domain = true },
]

[observability]
enabled = true

[vars]
ASSET_TTL_SECONDS = "3600"
BASE_URL = "https://serve.reearth.land"
ANONYMOUS_UPLOAD_ENABLED = "true"
# The extractor heartbeats job status every ~2 minutes (statusUpdateInterval
# in container/archive-extractor/worker.go), so a running job whose
# updated_at is older than 30 minutes has lost its container (e.g. stopped
# by a deploy rollout) and should be re-enqueued to resume from checkpoint.
# The previous 24h default left orphaned extractions invisible for a day.
EXTRACTION_STUCK_THRESHOLD_SECONDS = "1800"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "reearth-serve"

[[kv_namespaces]]
binding = "KV"
id = "KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "reearth-serve"
database_id = "D1_DATABASE_ID"
migrations_dir = "worker/infra/migrations"

[[containers]]
class_name = "ArchiveExtractorContainer"
image = "./container/archive-extractor/Dockerfile"
image_build_context = "./container/archive-extractor"
max_instances = 20
# `lite` (256 MiB) was too small for Phase B's parallel multipart uploads of
# gzip-compressed entries — peak per-goroutine buffer reaches multipartPartSize
# (10 MiB), so 48 concurrent extractions blew past memory and the container
# OOM-killed silently (job stuck in `extracting`, fileCount=0).
# `standard-4` (4 vCPU / 12 GiB / 20 GB disk) because extraction throughput is
# CPU-bound on the decode-for-checksum side stream: a 200 GB-class PLATEAU
# citygml archive expands ~11×, and at 1 vCPU (standard-2) the measured
# pipeline topped out at ~37 MiB/s of uncompressed data (~30+ hours per
# archive). CPU is billed on utilization (not allocation) since 2025-10, so
# the extra vCPUs cost nothing while idle. See docs/adr/008-extractor-capacity.md
# and docs/adr/011-recompression-free-extraction.md.
instance_type = "standard-4"

[[durable_objects.bindings]]
name = "ARCHIVE_EXTRACTOR"
class_name = "ArchiveExtractorContainer"

[[containers]]
class_name = "ThumbnailContainer"
image = "./container/thumbnail/Dockerfile"
image_build_context = "./container/thumbnail"
max_instances = 20
# libvips streaming decode bounds memory well below the 4 GiB ceiling even for
# multi-hundred-MiB sources; 1/2 vCPU is enough because resize/encode is the
# CPU-bound step and a half-share keeps one libvips worker busy. Half the cost
# of standard-2 (extractor) for a noticeably lighter workload.
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "THUMBNAIL_GENERATOR"
class_name = "ThumbnailContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ArchiveExtractorContainer"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ThumbnailContainer"]

[[queues.producers]]
binding = "EXTRACTION_QUEUE"
queue = "reearth-serve-extraction"

[[queues.consumers]]
queue = "reearth-serve-extraction"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "reearth-serve-extraction-dlq"
max_concurrency = 5

[[queues.producers]]
binding = "THUMBNAIL_QUEUE"
queue = "reearth-serve-thumbnail"

[[queues.consumers]]
queue = "reearth-serve-thumbnail"
# Process one image at a time: each invocation decodes the source and writes
# four sizes, which is already a sizable per-message workload. Batching would
# just stack memory usage inside the Worker without throughput benefit.
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "reearth-serve-thumbnail-dlq"
# Headroom for bursty uploads (an archive expansion may release many small
# images at once). Lower than extraction since each generation may also
# dispatch to the container with its own concurrency limit.
max_concurrency = 10

[triggers]
crons = ["*/10 * * * *"]
